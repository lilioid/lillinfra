apiVersion: v1
kind: List
items:

  # service
  - apiVersion: v1
    kind: Service
    metadata:
      name: firefly-data-importer
      labels: &labels
        app.kubernetes.io/name: firefly-iii
        app.kubernetes.io/component: data-importer
    spec:
      selector: *labels
      ports:
        - name: http
          port: 80
          protocol: TCP
          targetPort: http

  # deployment
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: firefly-data-importer
      labels: *labels
    spec:
      selector:
        matchLabels: *labels
      template:
        metadata:
          labels: *labels
        spec:
          containers:
            - name: firefly
              image: docker.io/fireflyiii/data-importer
              envFrom:
                - configMapRef:
                    name: data-importer-env
                - secretRef:
                    name: data-importer-env
              ports:
                - name: http
                  containerPort: 8080
              readinessProbe:
                timeoutSeconds: 5
                httpGet:
                  port: http
                  path: /health

