apiVersion: v1
kind: List
items:

  # service
  - apiVersion: v1
    kind: Service
    metadata:
      name: authentik-proxy
      labels: &labels
        app.kubernetes.io/name: authentik-proxy
        app.kubernetes.io/component: auth-proxy
    spec:
      selector: *labels
      ports:
        - name: http
          port: 9000
          protocol: TCP
          targetPort: http

  # deployment
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: authentik-proxy
      labels: *labels
    spec:
      selector:
        matchLabels: *labels
      template:
        metadata:
          labels: *labels
        spec:
          containers:
            - name: firefly
              image: ghcr.io/goauthentik/proxy
              envFrom:
                - secretRef:
                    name: authentik-proxy-env
              ports:
                - name: http
                  containerPort: 9000
              livenessProbe:
                httpGet:
                  port: http
                  path: /-/health/live/
              readinessProbe:
                timeoutSeconds: 15
                httpGet:
                  port: http
                  path: /-/health/ready/

